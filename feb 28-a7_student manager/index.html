<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f5;
            color: #333;
            line-height: 1.6;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #4F46E5;
            margin-bottom: 25px;
        }

        .add-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .add-section h2 {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .add-section input {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .add-section button {
            background-color: #4F46E5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .add-section button:hover {
            background-color: #3730a3;
        }

        .students-list {
            max-width: 600px;
            margin: 0 auto;
        }

        .student-card {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .student-card h3 {
            color: #4F46E5;
            margin-bottom: 5px;
        }

        .student-card p {
            font-size: 0.9rem;
            color: #555;
        }

        .student-card .average {
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }

        .student-card .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .student-card .delete-btn:hover {
            background: #c0392b;
        }

        .summary {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Student Manager</h1>

    <div class="add-section">
        <h2>Add New Student</h2>
        <input type="text" id="nameInput" placeholder="Student Name">
        <input type="number" id="mathInput" placeholder="Math Marks">
        <input type="number" id="scienceInput" placeholder="Science Marks">
        <input type="number" id="englishInput" placeholder="English Marks">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <div class="students-list" id="studentsList"></div>
    <div class="summary" id="summary"></div>

    <script>
        let students = [];

        function addStudent() {
            let name = document.getElementById("nameInput").value;
            let math = Number(document.getElementById("mathInput").value);
            let science = Number(document.getElementById("scienceInput").value);
            let english = Number(document.getElementById("englishInput").value);

            if (name === "" || math === "" || science === "" || english === "") {
                alert("Please fill all fields!");
                return;
            }

            let student = {
                name: name,
                marks: {
                    math: math,
                    science: science,
                    english: english
                }
            };

            students.push(student);

            // clear inputs
            document.getElementById("nameInput").value = "";
            document.getElementById("mathInput").value = "";
            document.getElementById("scienceInput").value = "";
            document.getElementById("englishInput").value = "";

            displayStudents();
        }

        function calculateAverage(marks) {
            let total = marks.math + marks.science + marks.english;
            let avg = total / 3;
            return avg.toFixed(2);
        }

        function deleteStudent(index) {
            students.splice(index, 1);
            displayStudents();
        }

        function displayStudents() {
            let list = document.getElementById("studentsList");
            list.innerHTML = "";

            for (let i = 0; i < students.length; i++) {
                let s = students[i];
                let avg = calculateAverage(s.marks);

                let card = document.createElement("div");
                card.className = "student-card";
                card.innerHTML = `
                    <h3>${s.name}</h3>
                    <p>Math: ${s.marks.math} | Science: ${s.marks.science} | English: ${s.marks.english}</p>
                    <p class="average">Average: ${avg}</p>
                    <button class="delete-btn" onclick="deleteStudent(${i})">Delete</button>
                `;
                list.appendChild(card);
            }

            // show summary
            let summary = document.getElementById("summary");
            if (students.length > 0) {
                let classTotal = 0;
                for (let i = 0; i < students.length; i++) {
                    classTotal += Number(calculateAverage(students[i].marks));
                }
                let classAvg = (classTotal / students.length).toFixed(2);
                summary.textContent = "Total Students: " + students.length + " | Class Average: " + classAvg;
            } else {
                summary.textContent = "";
            }
        }
    </script>

</body>
</html>
